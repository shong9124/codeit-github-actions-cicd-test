name: CI Workflow   # 현재 워크플로우의 이름

on:     # 워크플로우 실행 조건
  push:     # push가 발생하는 시점에
    branches: ["main"]    # 메인 브랜치에서

jobs:   # 실행할 작업(job) 정의
  build:    # build 라는 작업 설정
    runs-on: ubuntu-latest    # 실행 환경 설정(build라는 job이 이 환경에서 실행됨)

    steps:    # job 안에서 실행될 단계
      - uses: actions/checkout@v3     # 현제 레포의 코드를 checkout(가져옴)

      - name: JDK 17 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'

      - name: 빌드 및 테스트
        run: ./gradlew clean build